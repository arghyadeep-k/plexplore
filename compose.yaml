services:
  plexplore:
    build:
      context: .
      dockerfile: Dockerfile
    image: plexplore:latest
    container_name: plexplore
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # This compose file is production-oriented by default.
      APP_DEPLOYMENT_MODE: "production"
      APP_HTTP_LISTEN_ADDR: "0.0.0.0:8080"
      APP_SQLITE_PATH: "/data/plexplore.db"
      APP_SPOOL_DIR: "/data/spool"
      APP_MIGRATIONS_DIR: "/app/migrations"
      APP_BUFFER_MAX_POINTS: "256"
      APP_BUFFER_MAX_BYTES: "262144"
      APP_FLUSH_INTERVAL: "10s"
      APP_FLUSH_BATCH_SIZE: "128"
      APP_FLUSH_TRIGGER_POINTS: "192"
      APP_FLUSH_TRIGGER_BYTES: "196608"
      APP_COOKIE_SECURE_MODE: "always"
      APP_TRUST_PROXY_HEADERS: "false"
      APP_EXPECT_TLS_TERMINATION: "true"
      APP_ALLOW_INSECURE_HTTP: "false"
      # Map tile privacy posture:
      # - none: no external tile requests (default privacy mode)
      # - custom: set APP_MAP_TILE_URL_TEMPLATE to your own/local tile server
      # - osm: explicit opt-in to OpenStreetMap tiles
      APP_MAP_TILE_MODE: "none"
      APP_MAP_TILE_URL_TEMPLATE: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
      APP_MAP_TILE_ATTRIBUTION: "&copy; OpenStreetMap contributors"
      APP_RATE_LIMIT_ENABLED: "true"
      APP_RATE_LIMIT_LOGIN_MAX_REQUESTS: "10"
      APP_RATE_LIMIT_LOGIN_WINDOW: "1m"
      APP_RATE_LIMIT_ADMIN_MAX_REQUESTS: "30"
      APP_RATE_LIMIT_ADMIN_WINDOW: "1m"
      APP_SPOOL_FSYNC_MODE: "balanced"
      APP_SPOOL_FSYNC_INTERVAL: "2s"
      APP_SPOOL_FSYNC_BYTE_THRESHOLD: "65536"
    volumes:
      - ./data:/data
